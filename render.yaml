services:
  - type: web
    name: lernova-monitoring
    env: python
    pythonVersion: 3.11.9
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r monitoring_requirements.txt
    startCommand: uvicorn monitoring_server:app --host 0.0.0.0 --port 8000
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

