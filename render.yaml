services:
  - type: web
    name: lernova-api
    runtime: docker
    region: oregon
    plan: free

    # GitHub Auto-Deploy Configuration
    repo: https://github.com/solaeraabprivatelimited-cmd/ElmOrbit_API.git
    branch: main
    autoDeploy: true

    # Docker Configuration
    dockerfilePath: ./Dockerfile
    dockerContext: .

    # Environment Variables
    # ⚠️ IMPORTANT: Set these REQUIRED SECRET values in Render Dashboard, not here
    # 1. GROQ_API_KEY - Get from https://console.groq.com
    # 2. SUPABASE_SERVICE_ROLE_KEY - From Supabase dashboard
    # 3. SUPABASE_ANON_KEY - From Supabase dashboard (public key is safe here)
    envVars:
      - key: SUPABASE_URL
        value: https://evtvzmherkrahjsxdddi.supabase.co
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://lernova-alpha.vercel.app,https://app.elmorbit.co.in,http://localhost:5173
      - key: PORT
        value: "8000"

    # Health Check (UptimeRobot will monitor this)
    healthCheckPath: /health
    healthCheckInterval: 30

    # Auto-Restart Policy
    restartPolicy: always
