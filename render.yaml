services:
  - type: web
    name: lernova-api
    runtime: docker
    region: oregon
    plan: free

    # GitHub Auto-Deploy Configuration
    repo: https://github.com/solaeraabprivatelimited-cmd/ElmOrbit_API.git
    branch: main
    autoDeploy: true

    # Docker Configuration
    dockerfilePath: ./Dockerfile
    dockerContext: .

    # Environment Variables
    # Set SUPABASE_SERVICE_ROLE_KEY, SUPABASE_ANON_KEY, GROQ_API_KEY, JWT_SECRET_KEY in Render Dashboard
    envVars:
      - key: SUPABASE_URL
        value: https://evtvzmherkrahjsxdddi.supabase.co
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: CORS_ORIGINS
        value: https://lernova-alpha.vercel.app,https://app.elmorbit.co.in,http://localhost:5173
      - key: PORT
        value: "8000"
      - key: ENVIRONMENT
        value: production

    # Health Check
    healthCheckPath: /health
    healthCheckInterval: 30

    # Auto-Restart Policy
    restartPolicy: always
